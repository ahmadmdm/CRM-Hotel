services:
  frontend:
    build:
      context: ../frontend
      dockerfile: docker/web.Dockerfile
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_started
      media:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env
    environment:
      MEDIA_ROOT: /srv/media
      MEDIA_PUBLIC_BASE_URL: http://127.0.0.1:${MEDIA_PORT:-8081}/media
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - media_data:/srv/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      MEDIA_ROOT: /srv/media
    volumes:
      - media_data:/srv/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  media:
    image: nginx:1.29-alpine
    ports:
      - "${MEDIA_PORT:-8081}:80"
    volumes:
      - ./docker/media.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/usr/share/nginx/html/media:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crmhotel
      POSTGRES_USER: crmhotel
      POSTGRES_PASSWORD: crmhotel
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmhotel -d crmhotel"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  media_data: