name: crmhotel-prod

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: docker/web.Dockerfile
      args:
        API_BASE_URL: https://crm.clo0.net/api/v1
    image: ${CRMHOTEL_IMAGE_REGISTRY:-ghcr.io}/${CRMHOTEL_IMAGE_OWNER:-ahmadmdm}/crmhotel-frontend:${CRMHOTEL_IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3810}:80"
    depends_on:
      api:
        condition: service_started
      media:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: ${CRMHOTEL_IMAGE_REGISTRY:-ghcr.io}/${CRMHOTEL_IMAGE_OWNER:-ahmadmdm}/crmhotel-api:${CRMHOTEL_IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      APP_ENV: production
      ALLOWED_ORIGINS: https://crm.clo0.net
      MEDIA_PUBLIC_BASE_URL: https://crm.clo0.net/media
      MEDIA_ROOT: /srv/media
      SEED_DEMO_DATA: "false"
    ports:
      - "127.0.0.1:${APP_PORT:-3811}:8000"
    volumes:
      - media_data:/srv/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    image: ${CRMHOTEL_IMAGE_REGISTRY:-ghcr.io}/${CRMHOTEL_IMAGE_OWNER:-ahmadmdm}/crmhotel-worker:${CRMHOTEL_IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      APP_ENV: production
      MEDIA_ROOT: /srv/media
      SEED_DEMO_DATA: "false"
    volumes:
      - media_data:/srv/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  media:
    image: nginx:1.29-alpine
    ports:
      - "127.0.0.1:${MEDIA_PORT:-3812}:80"
    volumes:
      - ./docker/media.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/usr/share/nginx/html/media:ro
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crmhotel
      POSTGRES_USER: crmhotel
      POSTGRES_PASSWORD: crmhotel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmhotel -d crmhotel"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  media_data: