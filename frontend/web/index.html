<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="crmhotel_frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>crmhotel_frontend</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.crmHotelOneSignal = (() => {
      let initializedAppId = null;
      let currentExternalId = null;

      function notificationUrl() {
        return new URL('#/app/notifications', document.baseURI).toString();
      }

      function run(action) {
        return new Promise((resolve, reject) => {
          window.OneSignalDeferred.push(async function (OneSignal) {
            try {
              const result = await action(OneSignal);
              resolve(result ?? true);
            } catch (error) {
              reject(error);
            }
          });
        });
      }

      return {
        init(config) {
          if (!config || !config.appId) {
            return Promise.resolve(false);
          }
          return run(async function (OneSignal) {
            if (initializedAppId !== config.appId) {
              await OneSignal.init({
                appId: config.appId,
                serviceWorkerPath: config.serviceWorkerPath || 'push/onesignal/OneSignalSDKWorker.js',
                serviceWorkerParam: {
                  scope: config.serviceWorkerScope || '/push/onesignal/',
                },
                autoResubscribe: true,
                welcomeNotification: { disable: true },
                notifyButton: { enable: false },
                notificationClickHandlerMatch: 'origin',
                notificationClickHandlerAction: 'navigate',
              });
              initializedAppId = config.appId;
            }
            OneSignal.Notifications.setDefaultUrl(notificationUrl());
            return true;
          });
        },
        login(externalId) {
          if (!externalId) {
            return Promise.resolve(false);
          }
          return run(async function (OneSignal) {
            if (currentExternalId !== externalId) {
              await OneSignal.login(externalId);
              currentExternalId = externalId;
            }
            return true;
          });
        },
        logout() {
          return run(async function (OneSignal) {
            if (initializedAppId) {
              await OneSignal.logout();
            }
            currentExternalId = null;
            return true;
          });
        },
        promptPush() {
          return run(async function (OneSignal) {
            if (!OneSignal.Notifications.isPushSupported()) {
              return false;
            }
            if (OneSignal.Notifications.permission) {
              if (OneSignal.User.PushSubscription.optedIn === false) {
                await OneSignal.User.PushSubscription.optIn();
              }
              return true;
            }
            await OneSignal.Notifications.requestPermission();
            if (
              OneSignal.Notifications.permission &&
              OneSignal.User.PushSubscription.optedIn === false
            ) {
              await OneSignal.User.PushSubscription.optIn();
            }
            return !!OneSignal.Notifications.permission;
          });
        },
      };
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    (async function loadFlutterBootstrap() {
      let buildId = Date.now().toString();

      try {
        const response = await fetch(`.last_build_id?ts=${Date.now()}`, {
          cache: 'no-store',
        });
        if (response.ok) {
          const resolvedBuildId = (await response.text()).trim();
          if (resolvedBuildId) {
            buildId = resolvedBuildId;
          }
        }
      } catch (_) {
        // Fall back to a timestamp when the build id cannot be fetched.
      }

      const bootstrapScript = document.createElement('script');
      bootstrapScript.src = `flutter_bootstrap.js?v=${encodeURIComponent(buildId)}`;
      bootstrapScript.async = true;
      document.body.appendChild(bootstrapScript);
    })();
  </script>
</body>
</html>
