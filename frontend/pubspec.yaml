name: crmhotel_frontend
description: Responsive admin and worker application for CrmHotel.
publish_to: none
version: 0.2.0+1

environment:
  sdk: ">=3.11.0 <3.12.0"
  flutter: ">=3.41.0 <3.42.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  file_picker: ^10.3.3
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^16.0.0
  intl: ^0.20.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  fonts:
    - family: ThmanyahSans
      fonts:
        - asset: assets/fonts/thmanyahsans-Light.otf
          weight: 300
        - asset: assets/fonts/thmanyahsans-Regular.otf
          weight: 400
        - asset: assets/fonts/thmanyahsans-Medium.otf
          weight: 500
        - asset: assets/fonts/thmanyahsans-Bold.otf
          weight: 700
        - asset: assets/fonts/thmanyahsans-Black.otf
          weight: 900
    - family: ThmanyahSerifDisplay
      fonts:
        - asset: assets/fonts/thmanyahserifdisplay-Light.otf
          weight: 300
        - asset: assets/fonts/thmanyahserifdisplay-Regular.otf
          weight: 400
        - asset: assets/fonts/thmanyahserifdisplay-Medium.otf
          weight: 500
        - asset: assets/fonts/thmanyahserifdisplay-Bold.otf
          weight: 700
        - asset: assets/fonts/thmanyahserifdisplay-Black.otf
          weight: 900
    - family: ThmanyahSerifText
      fonts:
        - asset: assets/fonts/thmanyahseriftext-Light.otf
          weight: 300
        - asset: assets/fonts/thmanyahseriftext-Regular.otf
          weight: 400
        - asset: assets/fonts/thmanyahseriftext-Medium.otf
          weight: 500
        - asset: assets/fonts/thmanyahseriftext-Bold.otf
          weight: 700
        - asset: assets/fonts/thmanyahseriftext-Black.otf
          weight: 900
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic.ttf
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
    - family: NotoSansSymbols
      fonts:
        - asset: assets/fonts/NotoSansSymbols-Regular.ttf
    - family: NotoSansSymbols2
      fonts:
        - asset: assets/fonts/NotoSansSymbols2-Regular.ttf
